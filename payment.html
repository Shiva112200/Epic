<!doctype html>
<html lang="en">
  <style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Payments</title>

    /* ================================
   GOOGLE FONT
================================ */
@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap");

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

:root{
    --primary:#2563eb;
    --secondary:#3b82f6;
    --success:#16a34a;
    --danger:#ef4444;
    --dark:#0f172a;
    --text:#334155;
    --card-bg:rgba(255,255,255,0.82);
}

/* ================================
   BODY
================================ */
body{
    min-height:100vh;
    padding:30px;

    background:
    radial-gradient(circle at top left,#60a5fa 0%,transparent 30%),
    radial-gradient(circle at top right,#818cf8 0%,transparent 25%),
    radial-gradient(circle at bottom left,#22d3ee 0%,transparent 30%),
    linear-gradient(135deg,#eef2ff,#f8fafc,#dbeafe);

    background-attachment:fixed;
    overflow-x:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    background:rgba(59,130,246,0.15);
    filter:blur(120px);
    top:-250px;
    right:-200px;
    animation:float1 10s infinite alternate;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(139,92,246,0.15);
    filter:blur(120px);
    bottom:-200px;
    left:-150px;
    animation:float2 12s infinite alternate;
    z-index:-1;
}

@keyframes float1{
    from{transform:translateY(0);}
    to{transform:translateY(60px);}
}

@keyframes float2{
    from{transform:translateY(0);}
    to{transform:translateY(-60px);}
}

/* ================================
   CONTAINER
================================ */
.container{
    max-width:1500px;
    margin:auto;
}

/* ================================
   HEADER
================================ */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    flex-wrap:wrap;
    gap:15px;
}

h1{
    font-size:42px;
    font-weight:800;
    color:var(--dark);
    letter-spacing:1px;
    text-shadow:0 4px 20px rgba(37,99,235,.15);
}

/* ================================
   BUTTONS
================================ */
.refresh-btn{
    border:none;
    padding:14px 28px;
    border-radius:14px;
    cursor:pointer;
    color:white;
    font-weight:600;
    font-size:14px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #3b82f6,
    #60a5fa);

    background-size:200% 200%;
    animation:gradientMove 4s infinite;

    transition:.35s;
}

.refresh-btn:hover{
    transform:translateY(-4px);
    box-shadow:
    0 12px 30px rgba(37,99,235,.4),
    0 0 20px rgba(59,130,246,.35);
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* ================================
   TABLE CARD
================================ */
.table-container{
    background:var(--card-bg);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border-radius:30px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.4);

    box-shadow:
    0 20px 60px rgba(0,0,0,.08),
    0 8px 20px rgba(0,0,0,.05);

    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

table{
    width:100%;
    border-collapse:collapse;
}

/* ================================
   TABLE HEADER
================================ */
th{
    padding:20px;

    background:
    linear-gradient(
    135deg,
    #1e3a8a,
    #2563eb,
    #3b82f6);

    color:white;

    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* ================================
   TABLE DATA
================================ */
td{
    padding:18px;
    text-align:center;
    color:var(--text);
    border-bottom:1px solid #e5e7eb;
    transition:.3s;
}

tbody tr{
    transition:.35s;
}

tbody tr:hover{
    background:rgba(59,130,246,.05);
    transform:scale(1.01);
}

/* Order ID */
td:nth-child(1){
    color:#2563eb;
    font-weight:700;
}

/* Amount */
td:nth-child(2){
    color:#16a34a;
    font-weight:700;
    font-size:15px;
}

/* ================================
   STATUS BADGES
================================ */
.status-success{
    display:inline-flex;
    align-items:center;
    gap:6px;

    background:#dcfce7;
    color:#15803d;

    padding:8px 16px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;

    box-shadow:0 4px 10px rgba(22,163,74,.15);
}

.status-success::before{
    content:"●";
}

.status-refunded{
    display:inline-flex;
    align-items:center;
    gap:6px;

    background:#fee2e2;
    color:#dc2626;

    padding:8px 16px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;

    box-shadow:0 4px 10px rgba(239,68,68,.15);
}

.status-refunded::before{
    content:"●";
}

/* ================================
   REFUND BUTTON
================================ */
.refund-btn{
    border:none;
    cursor:pointer;

    padding:12px 22px;
    border-radius:14px;

    color:white;
    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #ef4444,
    #dc2626);

    transition:.35s;
}

.refund-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 12px 25px rgba(239,68,68,.35);
}

.refund-btn:disabled{
    background:#94a3b8;
    cursor:not-allowed;
    box-shadow:none;
    transform:none;
}

/* ================================
   LOADER
================================ */
.loader{
    padding:50px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    color:#64748b;
}

/* ================================
   SCROLLBAR
================================ */
::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#e2e8f0;
}

::-webkit-scrollbar-thumb{
    background:linear-gradient(
    #2563eb,
    #3b82f6);
    border-radius:20px;
}

/* ================================
   RESPONSIVE
================================ */
@media(max-width:1100px){

    body{
        padding:15px;
    }

    h1{
        font-size:30px;
    }

    .table-container{
        overflow-x:auto;
    }

    table{
        min-width:1000px;
    }
}

@media(max-width:768px){

    .header{
        flex-direction:column;
        text-align:center;
    }

    h1{
        font-size:26px;
    }

    .refresh-btn{
        width:100%;
    }
}</style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>💳 Payment Management</h1>

        <button class="refresh-btn" onclick="loadPayments()">🔄 Refresh</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Payment ID</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Method</th>
              <th>Transaction ID</th>
              <th>Date</th>
              <th>Refunded</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="paymentTable">
            <tr>
              <td colspan="8" class="loader">Loading Payments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const BASE_URL = "http://localhost:8085";

      const token = localStorage.getItem("token");

      if (!token) {
        alert("Please Login First!");
        window.location.href = "login.html";
      }

      const headers = {
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json",
      };

      // Format Date
      function formatDate(dateString) {
        if (!dateString) return "-";

        const date = new Date(dateString);

        return date.toLocaleString("en-IN", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      // Load Payments
      async function loadPayments() {
        const table = document.getElementById("paymentTable");

        table.innerHTML = `
        <tr>
            <td colspan="8" class="loader">
                Loading Payments...
            </td>
        </tr>
    `;

        try {
          const response = await fetch(`${BASE_URL}/api/payment/all`, {
            method: "GET",
            headers: headers,
          });

          if (response.status === 401) {
            alert("Session Expired. Please Login Again.");

            localStorage.clear();

            window.location.href = "login.html";

            return;
          }

          if (!response.ok) {
            throw new Error(`Error ${response.status}`);
          }

          const payments = await response.json();

          table.innerHTML = "";

          if (payments.length === 0) {
            table.innerHTML = `
                <tr>
                    <td colspan="8">
                        No Payments Found
                    </td>
                </tr>
            `;

            return;
          }

          payments.forEach((payment) => {
            const badgeClass =
              payment.paymentStatus === "REFUNDED"
                ? "status-refunded"
                : "status-success";

            table.innerHTML += `
                <tr>

                    <td>
                        #${payment.paymentId}
                    </td>

                    <td>
                        ₹${Number(payment.amount).toLocaleString("en-IN")}
                    </td>

                    <td>
                        <span class="${badgeClass}">
                            ${payment.paymentStatus}
                        </span>
                    </td>

                    <td>
                        ${payment.paymentMethod || "CARD"}
                    </td>

                    <td title="${payment.transactionId || "-"}">
                        ${payment.transactionId || "-"}
                    </td>

                    <td>
                        ${formatDate(payment.paymentDate)}
                    </td>

                    <td>
                        ${payment.refunded ? "✅ Yes" : "❌ No"}
                    </td>

                    <td>

                        ${
                          payment.refunded
                            ? `<button
                                class="refund-btn"
                                disabled>
                                Refunded
                             </button>`
                            : `<button
                                class="refund-btn"
                                onclick="refundPayment(${payment.paymentId}, event)">
                                Refund
                             </button>`
                        }

                    </td>

                </tr>
            `;
          });
        } catch (error) {
          console.error("Load Error:", error);

          table.innerHTML = `
            <tr>
                <td colspan="8">
                    Failed To Load Payments
                </td>
            </tr>
        `;
        }
      }

      // Refund Payment
      async function refundPayment(paymentId, event) {
        const confirmRefund = confirm(`
⚠️ REFUND PAYMENT

This action will:

• Refund customer amount
• Restore inventory stock
• Update order status

Continue?
`);

        if (!confirmRefund) return;

        const button = event.target;

        button.disabled = true;
        button.innerHTML = "⏳ Processing...";

        try {
          const response = await fetch(
            `${BASE_URL}/api/payment/refund/${paymentId}`,
            {
              method: "POST",
              headers: headers,
            },
          );

          if (!response.ok) {
            throw new Error(`Refund Failed (${response.status})`);
          }

          alert(`
✅ REFUND SUCCESSFUL

Payment refunded successfully.

Inventory restored.
Order status updated.
        `);

          loadPayments();
        } catch (error) {
          console.error("Refund Error:", error);

          button.disabled = false;
          button.innerHTML = "Refund";

          alert(`
❌ REFUND FAILED

Please try again.
        `);
        }
      }

      // Initial Load
      loadPayments();
    </script>
  </body>
</html>
